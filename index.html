<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>幻燈片首頁</title>
  <style>
    /* === 全域設定 === */
    * {
      box-sizing: border-box;
    }
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: "Noto Sans TC", sans-serif;
      background-color: #000;
      overflow: hidden;
    }


    /* === 導覽列 === */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 40px;
      z-index: 10;
    }


    nav .logo {
      font-size: 1.5em;
      font-weight: bold;
    }


    nav ul {
      list-style: none;
      display: flex;
      margin: 0;
      padding: 0;
    }


    nav ul li {
      margin-left: 25px;
    }


    nav ul li a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.3s;
    }


    nav ul li a:hover {
      color: #ffd700;
    }


    /* === 幻燈片容器 === */
    .slideshow-container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }


    .slide {
      display: none;
      width: 100%;
      height: 100vh;
      background-size: cover;
      background-position: center;
      animation: fade 1.5s ease-in-out;
    }


    @keyframes fade {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }


    /* === 文字標題 === */
    .title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 3em;
      text-shadow: 0 0 10px rgba(0,0,0,0.6);
      text-align: center;
      z-index: 5;
    }


    /* === 左右箭頭 === */
    .prev, .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      width: auto;
      margin-top: -22px;
      padding: 16px;
      color: white;
      font-weight: bold;
      font-size: 2em;
      transition: 0.3s;
      user-select: none;
      background: rgba(0,0,0,0.4);
      border-radius: 50%;
      z-index: 5;
    }


    .next { right: 20px; }
    .prev { left: 20px; }


    .prev:hover, .next:hover {
      background-color: rgba(255,255,255,0.3);
    }


    /* === 點點指示器 === */
    .dots {
      position: absolute;
      bottom: 30px;
      width: 100%;
      text-align: center;
      z-index: 5;
    }


    .dot {
      cursor: pointer;
      height: 15px;
      width: 15px;
      margin: 0 5px;
      background-color: rgba(255,255,255,0.5);
      border-radius: 50%;
      display: inline-block;
      transition: background-color 0.3s;
    }


    .active, .dot:hover {
      background-color: #fff;
    }
  </style>
</head>
<body>


  <!-- 導覽列 -->
  <nav>
    <div class="logo">我的網站</div>
    <ul>
      <li><a href="#">首頁</a></li>
      <li><a href="#">關於我們</a></li>
      <li><a href="#">服務項目</a></li>
      <li><a href="#">聯絡</a></li>
    </ul>
  </nav>


  <!-- 幻燈片容器 -->
  <div class="slideshow-container">


    <div class="slide" style="background-image: url('image1.jpg');"></div>
    <div class="slide" style="background-image: url('image2.jpg');"></div>
    <div class="slide" style="background-image: url('image3.jpg');"></div>
    <div class="slide" style="background-image: url('image4.jpg');"></div>
    <div class="slide" style="background-image: url('image5.jpg');"></div>


    <div class="title">歡迎來到我的網站</div>


    <!-- 左右箭頭 -->
    <a class="prev" onclick="plusSlides(-1)">❮</a>
    <a class="next" onclick="plusSlides(1)">❯</a>


    <!-- 點點指示器 -->
    <div class="dots">
      <span class="dot" onclick="currentSlide(1)"></span>
      <span class="dot" onclick="currentSlide(2)"></span>
      <span class="dot" onclick="currentSlide(3)"></span>
      <span class="dot" onclick="currentSlide(4)"></span>
      <span class="dot" onclick="currentSlide(5)"></span>
    </div>
  </div>


  <!-- JavaScript 控制幻燈片 -->
  <script>
    let slideIndex = 0;
    let slides = document.getElementsByClassName("slide");
    let dots = document.getElementsByClassName("dot");
    let autoSlideTimer;


    function showSlides(n) {
      if (n > slides.length) { slideIndex = 1; }
      if (n < 1) { slideIndex = slides.length; }
      for (let i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }
      for (let i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active", "");
      }
      slides[slideIndex - 1].style.display = "block";
      dots[slideIndex - 1].className += " active";
    }


    function plusSlides(n) {
      clearTimeout(autoSlideTimer);
      showSlides(slideIndex += n);
      autoSlides();
    }


    function currentSlide(n) {
      clearTimeout(autoSlideTimer);
      showSlides(slideIndex = n);
      autoSlides();
    }


    function autoSlides() {
      slideIndex++;
      if (slideIndex > slides.length) { slideIndex = 1; }
      showSlides(slideIndex);
      autoSlideTimer = setTimeout(autoSlides, 5000); // 每5秒切換一次
    }


    // 初始化
    showSlides(slideIndex = 1);
    autoSlides();
  </script>


</body>
</html>
